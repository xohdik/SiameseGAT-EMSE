# ═══════════════════════════════════════════════════════════
# Siamese GAT Journal Paper - Configuration
# ═══════════════════════════════════════════════════════════

paths:
  data_dir: "./data"
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  graph_dir: "./data/graphs"
  output_dir: "./outputs"
  graphcodebert_model: "microsoft/graphcodebert-base"

datasets:
  humanevalfix:
    enabled: true
    source: "bigcode/humanevalpack"
    language: "python"
    description: "Expert-crafted single-fault bugs (164 pairs)"
  
  codenet:
    enabled: true
    source: "IBM/Project_CodeNet"
    language: "Python"
    max_problems: 2000
    max_pairs_per_problem: 5
    description: "Competitive programming accepted vs wrong-answer"
  
  apps:
    enabled: true
    source: "codeparrot/apps"
    difficulty: ["introductory", "interview"]
    max_pairs: 3000
    description: "Coding interview problems with multiple solutions"
  
  mbpp:
    enabled: true
    source: "google-research-datasets/mbpp"
    bug_injection: true  # Use LLM to inject bugs
    description: "Mostly Basic Python Problems with synthetic bugs"

graph_construction:
  code_length: 256        # Max subword tokens for code
  data_flow_length: 64    # Max DFG nodes
  max_nodes: 320          # code_length + data_flow_length
  add_self_loops: true
  bidirectional: true
  edge_types: 3           # sequential, dfg_to_code, dfg_to_dfg

model:
  # GAT Architecture (improved from v1)
  hidden_dim: 256         # Up from 128
  num_heads: 4            # Up from 2
  num_layers: 2           # Up from 1
  dropout: 0.3
  attention_dropout: 0.1
  
  # Pooling
  pooling: "attention"    # "mean" | "attention" | "max"
  
  # Classifier MLP
  mlp_hidden: 256
  mlp_dropout: 0.3
  num_classes: 2
  
  # GraphCodeBERT
  unfreeze_layers: 2      # Unfreeze last N transformer layers (0 = all frozen)
  embedding_dim: 768

training:
  # Cross-validation
  n_folds: 5
  fold_type: "problem"    # Split by problem, not by sample
  
  # Optimization
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  batch_size: 16          # Up from 8 (more data)
  max_epochs: 100
  patience: 15
  gradient_clip: 1.0
  
  # Scheduler
  scheduler: "cosine"     # "cosine" | "step" | "none"
  warmup_epochs: 5
  
  # Data augmentation
  swap_augmentation: true  # Train with both (A,B) and (B,A) orderings
  
  # Device
  device: "cuda"
  seed: 42

baselines:
  llm:
    models:
      - name: "gpt-4o"
        provider: "openai"
      - name: "claude-sonnet-4-20250514"
        provider: "anthropic"
      - name: "deepseek-coder-v2"
        provider: "local"
    max_samples: 500       # Subsample for cost control
    temperature: 0.0
  
  embedding:
    models: ["graphcodebert", "codebert", "unixcoder"]
    classifiers: ["svm_rbf", "svm_linear", "rf", "mlp", "finetune"]

evaluation:
  metrics: ["f1_macro", "accuracy", "precision", "recall", "auc"]
  
  localization:
    enabled: true
    top_k: [1, 3, 5, 10]
    visualization_samples: 20
  
  cross_benchmark:
    enabled: true
    # Train on combined → test on each held-out benchmark
